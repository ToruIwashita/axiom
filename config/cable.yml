# Action Cable 設定
# Phase 2.3 Step 3-8 で Backtesting::Run#after_update_commit の Turbo Streams
# broadcast を有効化するため,test 環境を含めた Action Cable adapter を整備.

development:
  adapter: async

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: axiom_production
