---
:concurrency: 10
:queues:
  # LiveTradingWorker(Phase 3.3 で実装済 / retry: false / 24h 長時間稼働)を
  # 専用 queue に分離することで他 Job との干渉を防ぐ(Phase 1.3 引き継ぎ #9 / 3.3-14 再確認済)
  # priority weight: 高=2(LiveTrading)/ 既存=1(default)
  #
  # === concurrency 計算根拠(3.3-14 / Phase 3.3 Worker 実装完了時点)===
  # Sidekiq の :concurrency は「Job thread の同時実行上限」.
  # 1 LiveTrading::Session = 1 LiveTradingWorker = 1 Sidekiq Job thread を占有(perform は無限ループ).
  # よって :concurrency=10 = 最大 10 セッション同時稼働.
  #
  # Worker 内で起動される追加 OS thread(Sidekiq 管理外, Ruby OS thread として独立):
  #   - BitgetPublicWsClient heartbeat thread(セッション毎 1)
  #   - BitgetPrivateWsClient heartbeat thread(セッション毎 1)
  #   - reconnect_with_backoff(heartbeat thread 内, 同 thread)
  #   - run_in_db_thread(candle 確定 / WS callback ごとに一時生成 + AR connection 確保)
  # 1 セッションあたり常駐 OS thread ≈ 2-3, 一時 thread ≈ 1-2.
  # concurrency=10 セッション同時稼働時の総 OS thread 数 ≈ 30-50(MVP では十分).
  #
  # === ActiveRecord connection pool との整合(3.3-10b/c/d で run_in_db_thread 経由で利用)===
  # config/database.yml の `pool:` は Sidekiq concurrency + 余裕(各 Worker から起動する run_in_db_thread)
  # を満たす値が必要. 現状デフォルト 5 では不足する可能性 → MVP 後の運用拡大時に再判断する将来候補.
  #
  # 必要に応じて運用拡大時(複数セッション並行)に再調整する.
  - [ live_trading, 2 ]
  - [ default, 1 ]
